<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>응급의학과 담벼락</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ER 담벼락" />
  <meta name="theme-color" content="#1a5fa8" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #fff; --surface2: #f9f8f5;
      --border: rgba(0,0,0,0.08); --border-h: rgba(0,0,0,0.16);
      --text: #1a1a1a; --text2: #6b6b6b; --text3: #aaa;
      --blue: #1a5fa8; --blue-l: #e8f0fb; --blue-t: #0d3d6e;
      --red: #c0392b; --red-l: #fdecea; --red-t: #7b1a12;
      --green: #1a7a55; --green-l: #e4f5ee; --green-t: #0d4a32;
      --amber: #9a6200; --amber-l: #fef6e4; --amber-t: #5c3a00;
      --purple: #5a3eb0; --purple-l: #eeebfc; --purple-t: #2e1d6b;
      --gray-l: #f0efe9; --gray-t: #444;
      --r: 12px; --rs: 8px;
    }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 50; }
    .hdr-in { max-width: 800px; margin: 0 auto; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .hdr h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,.2); }
    .dot-label { font-size: 12px; color: var(--text2); margin-left: 6px; }

    .main { max-width: 800px; margin: 0 auto; padding: 1.25rem 1.25rem 1rem; }

    /* Tabs */
    .tabs-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 7px; margin-bottom: 1.1rem; }
    .tab { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 11px 6px; border-radius: var(--rs); font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); transition: all .13s; user-select: none; white-space: nowrap; text-align: center; min-height: 44px; position: relative; }
    .tab:hover { border-color: var(--border-h); color: var(--text); background: var(--surface2); }
    .tab:active { transform: scale(.97); }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 2px 8px rgba(26,95,168,.25); }
    .tab.add-tab { border-style: dashed; color: var(--text3); background: transparent; font-weight: 500; }
    .tab.add-tab:hover { color: var(--text2); border-color: var(--border-h); }
    .tab-menu-btn { position: absolute; top: 4px; right: 5px; font-size: 11px; line-height: 1; padding: 1px 3px; border-radius: 4px; cursor: pointer; transition: background .12s; opacity: .5; }
    .tab-menu-btn:hover { opacity: 1; }
    .tab.active .tab-menu-btn:hover { background: rgba(255,255,255,.25); }
    .tab:not(.active) .tab-menu-btn:hover { background: rgba(0,0,0,.08); }

    /* Compose */
    .compose { background: var(--surface); border-top: 1.5px solid var(--border); border-radius: 0; padding: 1rem 1.25rem; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; box-shadow: 0 -4px 20px rgba(0,0,0,.08); }
    .compose-inner { max-width: 800px; margin: 0 auto; }
    .compose-lbl { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 10px; }
    .compose textarea { width: 100%; resize: none; border: 1px solid var(--border); border-radius: var(--rs); padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--surface2); min-height: 78px; outline: none; transition: border-color .13s; line-height: 1.6; }
    .compose textarea:focus { border-color: var(--blue); }
    .compose textarea::placeholder { color: var(--text3); }
    .compose-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
    .type-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .tbtn { padding: 4px 11px; border-radius: 12px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); transition: all .12s; font-family: inherit; }
    .tbtn.active[data-type="tip"]      { background: var(--blue-l);  color: var(--blue-t);  border-color: #b3ccee; }
    .tbtn.active[data-type="protocol"] { background: var(--green-l); color: var(--green-t); border-color: #a8dcc5; }
    .tbtn.active[data-type="notice"]   { background: var(--red-l);   color: var(--red-t);   border-color: #f0b9b4; }
    .tbtn.active[data-type="general"]  { background: var(--gray-l);  color: var(--gray-t);  border-color: #ccc; }
    .author-in { border: 1px solid var(--border); border-radius: var(--rs); padding: 6px 10px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface2); outline: none; width: 90px; transition: border-color .13s; }
    .author-in:focus { border-color: var(--blue); }
    .post-btn { padding: 7px 22px; background: var(--blue); color: #fff; border: none; border-radius: var(--rs); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .13s; }
    .post-btn:hover { opacity: .85; }
    .post-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Image upload */
    .img-upload-area { border: 2px dashed var(--border); border-radius: var(--rs); padding: 1.75rem 1rem; text-align: center; cursor: pointer; transition: all .13s; margin-bottom: 10px; }
    .img-upload-area:hover, .img-upload-area.drag-over { border-color: var(--blue); background: var(--blue-l); }
    .upload-icon { font-size: 26px; margin-bottom: 6px; }
    .upload-hint  { font-size: 13px; color: var(--text3); }
    .upload-hint2 { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .prev-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 8px; margin-bottom: 10px; }
    .prev-item { position: relative; aspect-ratio: 1; border-radius: var(--rs); overflow: hidden; border: 1px solid var(--border); }
    .prev-item img { width: 100%; height: 100%; object-fit: cover; }
    .rm-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,.55); color: #fff; border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }

    /* Posts */
    .posts { display: flex; flex-direction: column; gap: 8px; }
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; transition: border-color .13s; }
    .post-card.important { border-left: 3px solid #f59e0b; }
    .post-top { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; flex-wrap: wrap; }
    .badge { padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .bd-dept   { background: var(--purple-l); color: var(--purple-t); }
    .bd-er     { background: #fef3c7; color: #92400e; }
    .bd-notice { background: var(--red-l);   color: var(--red-t); }
    .bd-proto  { background: var(--green-l); color: var(--green-t); }
    .bd-tip    { background: var(--blue-l);  color: var(--blue-t); }
    .bd-gen    { background: var(--gray-l);  color: var(--gray-t); }
    .bd-sched  { background: var(--amber-l); color: var(--amber-t); }
    .post-time { margin-left: auto; font-size: 11px; color: var(--text3); }
    .post-content { font-size: 14px; line-height: 1.7; }
    .post-author { font-size: 12px; color: var(--text2); margin-top: 8px; }
    .post-imgs { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 6px; margin-top: 10px; }
    .post-imgs img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--rs); cursor: pointer; border: 1px solid var(--border); transition: opacity .13s; }
    .post-imgs img:hover { opacity: .85; }

    /* Post actions */
    .post-actions { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .action-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: inherit; transition: all .12s; }
    .action-btn:hover { border-color: var(--border-h); color: var(--text); background: var(--surface2); }
    .action-btn.imp-on { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .action-btn.del { color: var(--red-t); border-color: transparent; }
    .action-btn.del:hover { background: var(--red-l); border-color: #f0b9b4; }

    /* Inline edit */
    .edit-box { margin-top: 8px; }
    .edit-box textarea { width: 100%; resize: none; border: 1px solid var(--blue); border-radius: var(--rs); padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--surface2); outline: none; line-height: 1.6; min-height: 70px; }
    .edit-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
    .edit-actions button { padding: 5px 14px; border-radius: var(--rs); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; border: 1px solid var(--border); background: transparent; color: var(--text2); }
    .edit-actions .save-btn { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* Schedule */
    .sched-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .sched-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: border-color .13s, transform .13s; }
    .sched-card:hover { border-color: var(--border-h); transform: translateY(-1px); }
    .sched-card img { width: 100%; aspect-ratio: 3/2; object-fit: contain; display: block; cursor: pointer; background: var(--surface2); }
    .sched-info { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
    .sched-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .sched-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .sched-del { font-size: 13px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
    .sched-del:hover { background: var(--red-l); color: var(--red-t); }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: flex; align-items: center; justify-content: center; z-index: 500; cursor: zoom-out; }
    .lightbox img { max-width: 92vw; max-height: 90vh; border-radius: var(--rs); object-fit: contain; }

    /* ── Usage guide ── */
    .guide { display: flex; flex-direction: column; gap: 14px; }
    .guide-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .guide-section-hdr { padding: 14px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .guide-section-hdr .g-icon { font-size: 20px; }
    .guide-section-hdr .g-title { font-size: 15px; font-weight: 600; }
    .guide-section-hdr .g-arrow { margin-left: auto; font-size: 12px; color: var(--text3); transition: transform .2s; }
    .guide-section-hdr.open .g-arrow { transform: rotate(180deg); }
    .guide-body { padding: 18px; display: none; }
    .guide-body.open { display: block; }
    .guide-step { display: flex; gap: 12px; margin-bottom: 16px; }
    .guide-step:last-child { margin-bottom: 0; }
    .step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-content .step-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .step-content .step-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }
    .step-content .step-img { margin-top: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rs); padding: 14px 16px; font-size: 13px; color: var(--text2); line-height: 1.7; }
    .step-content .step-img b { color: var(--text); font-weight: 600; }
    .tip-box { background: var(--blue-l); border: 1px solid #b3ccee; border-radius: var(--rs); padding: 12px 14px; font-size: 13px; color: var(--blue-t); line-height: 1.65; margin-top: 12px; }
    .url-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rs); padding: 10px 14px; font-size: 13px; font-family: monospace; color: var(--blue-t); margin-top: 8px; word-break: break-all; }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    .empty { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 14px; }
    .loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }

    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1a1a; color: #fff; padding: 9px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .2s; pointer-events: none; z-index: 400; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); }
    .modal { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 1.5rem; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .modal input { width: 100%; border: 1px solid var(--border); border-radius: var(--rs); padding: 9px 12px; font-size: 14px; font-family: inherit; background: var(--surface2); color: var(--text); outline: none; margin-bottom: 1rem; transition: border-color .13s; }
    .modal input:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button { padding: 7px 16px; border-radius: var(--rs); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; border: 1px solid var(--border); background: transparent; color: var(--text2); }
    .modal-btns .confirm { background: var(--blue); color: #fff; border-color: var(--blue); }
    .modal-btns .danger  { background: var(--red);  color: #fff; border-color: var(--red); }

    @media (max-width: 600px) {
      .main { padding: 1rem .85rem 1rem; }
      .hdr  { padding: 0 .85rem; }
      .compose-foot { flex-direction: column; align-items: flex-start; }
    }

    /* ── Splash ── */
    .splash { position: fixed; inset: 0; background: linear-gradient(135deg, #e8f4fd 0%, #fef9f0 50%, #f0faf4 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; text-align: center; transition: opacity .4s, transform .4s; }
    .splash.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }
    .splash-logo { font-size: 72px; margin-bottom: 1rem; animation: bounce 1.8s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .splash-title { font-size: 26px; font-weight: 600; color: #1a1a1a; letter-spacing: -.5px; margin-bottom: 6px; }
    .splash-sub { font-size: 15px; color: #6b6b6b; margin-bottom: 2.5rem; }
    .splash-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 340px; margin-bottom: 2.5rem; }
    .splash-card { background: #fff; border-radius: 16px; padding: 14px 10px; box-shadow: 0 2px 12px rgba(0,0,0,.07); display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 2px solid transparent; }
    .splash-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .splash-card:active { transform: scale(.97); }
    .splash-card .sc-icon { font-size: 28px; }
    .splash-card .sc-label { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .splash-card .sc-desc { font-size: 11px; color: #aaa; }
    .splash-card.c-blue  { border-color: #dbeafe; background: linear-gradient(135deg,#fff,#eff6ff); }
    .splash-card.c-red   { border-color: #fee2e2; background: linear-gradient(135deg,#fff,#fef2f2); }
    .splash-card.c-green { border-color: #dcfce7; background: linear-gradient(135deg,#fff,#f0fdf4); }
    .splash-card.c-amber { border-color: #fef9c3; background: linear-gradient(135deg,#fff,#fefce8); }
    .splash-card.c-purple{ border-color: #ede9fe; background: linear-gradient(135deg,#fff,#f5f3ff); }
    .splash-card.c-pink  { border-color: #fce7f3; background: linear-gradient(135deg,#fff,#fdf2f8); }
    .splash-enter { padding: 14px 40px; background: #1a5fa8; color: #fff; border: none; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(26,95,168,.35); transition: all .15s; }
    .splash-enter:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(26,95,168,.45); }
    .splash-enter:active { transform: scale(.97); }
    .splash-notice { font-size: 11px; color: #bbb; margin-top: 14px; }
  </style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-logo">🏥</div>
  <div class="splash-title">응급의학과 담벼락</div>
  <div class="splash-sub">우리끼리 공유하는 실시간 정보 게시판</div>
  <div class="splash-cards">
    <div class="splash-card c-blue"  onclick="enterApp('응급의학과')"><div class="sc-icon">🏥</div><div class="sc-label">응급의학과</div><div class="sc-desc">과 공지 · 정보</div></div>
    <div class="splash-card c-red"   onclick="enterApp('중요')"><div class="sc-icon">⭐</div><div class="sc-label">중요</div><div class="sc-desc">중요 표시 모음</div></div>
    <div class="splash-card c-green" onclick="enterApp('입원환자')"><div class="sc-icon">🛏️</div><div class="sc-label">입원환자</div><div class="sc-desc">입원 환자 정보</div></div>
    <div class="splash-card c-amber" onclick="enterApp('스케줄')"><div class="sc-icon">🗓️</div><div class="sc-label">스케줄</div><div class="sc-desc">당직표 · 일정</div></div>
  </div>
  <button class="splash-enter" onclick="enterApp('응급의학과')">시작하기 →</button>
  <div class="splash-notice">실시간 동기화 · Firebase 연결됨</div>
</div>

<div id="app">
  <header class="hdr">
    <div class="hdr-in">
      <h1>응급의학과 담벼락</h1>
      <div style="display:flex;align-items:center;">
        <div class="dot"></div>
        <span class="dot-label">실시간 연결됨</span>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="tabs-wrap" id="tabs-wrap"></div>
    <div id="posts-container"><div class="loading">불러오는 중...</div></div>
  </main>
</div>
<div id="compose-area"></div>
<div class="toast" id="toast"></div>
<div id="modal-area"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, addDoc, onSnapshot,
  query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, deleteDoc
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC_TNvySuxMUU6PIJ8jE1KiQkeBY9ogRbU",
  authDomain: "er-board.firebaseapp.com",
  projectId: "er-board",
  storageBucket: "er-board.firebasestorage.app",
  messagingSenderId: "639170610173",
  appId: "1:639170610173:web:c9b699638023c012aa4f94"
};

const db = getFirestore(initializeApp(firebaseConfig));

const FIXED = ['중요', '응급의학과', '입원환자', '스케줄', '사용방법'];
const FIXED_FRONT = ['중요', '응급의학과', '입원환자'];
const FIXED_BACK  = ['스케줄', '사용방법'];
let depts     = ['중요', '응급의학과', '입원환자', '정형외과', '신경외과', '내과', '외과', '산부인과', '스케줄', '사용방법'];
let activeTab = '응급의학과';
let activeType = 'tip';
let allPosts  = [];
let pendingImgs = [];
let editingId = null;
let editingType = null;

const typeLabels = { tip:'정보공유', protocol:'프로토콜', notice:'공지', general:'일반', schedule:'스케줄' };

// ── Dept persistence ──
async function loadDepts() {
  try {
    const snap = await getDoc(doc(db, 'meta', 'departments'));
    if (snap.exists() && snap.data().list?.length) {
      depts = snap.data().list;
      FIXED.forEach(f => { if (!depts.includes(f)) depts.push(f); });
    }
  } catch(e) {}
  // always enforce order: FIXED_FRONT ... middle ... FIXED_BACK
  const middle = depts.filter(d => !FIXED.includes(d));
  depts = [...FIXED_FRONT, ...middle, ...FIXED_BACK];
  renderTabs(); renderCompose();
}
async function saveDepts() {
  try { await setDoc(doc(db, 'meta', 'departments'), { list: depts }); } catch(e) {}
}

// ── Tabs ──
function renderTabs() {
  document.getElementById('tabs-wrap').innerHTML =
    depts.map(d => {
      const isActive = d === activeTab;
      const editBtn = FIXED.includes(d) ? '' :
        `<span class="tab-menu-btn" onclick="event.stopPropagation();showTabMenu('${d}')">✎</span>`;
      return `<div class="tab${isActive?' active':''}" onclick="setTab('${d}')">${d}${editBtn}</div>`;
    }).join('') +
    `<div class="tab add-tab" onclick="showAddModal()">+ 과 추가</div>`;
}

window.setTab = function(d) {
  activeTab = d; activeType = 'tip';
  pendingImgs = []; editingId = null;
  renderTabs(); renderCompose(); renderPosts();
};

window.renameTab = async function(old) {
  const val = document.getElementById('tab-rename').value.trim();
  if (!val || val === old) { closeModal(); return; }
  if (depts.includes(val)) { showToast('이미 있는 탭 이름이에요'); return; }
  depts[depts.indexOf(old)] = val;
  if (activeTab === old) activeTab = val;
  await saveDepts(); closeModal(); renderTabs(); renderCompose();
};
window.deleteTab = async function(dept) {
  if (!confirm(`「${dept}」 탭을 삭제할까요?`)) return;
  depts = depts.filter(d => d !== dept);
  if (activeTab === dept) activeTab = depts[0];
  await saveDepts(); closeModal(); renderTabs(); renderCompose(); renderPosts();
};

// ── Image handling ──
window.handleFiles = function(files) { Array.from(files).forEach(compressAndAdd); };
window.handleDrop  = function(e) {
  e.preventDefault(); document.getElementById('upload-zone')?.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
};
function compressAndAdd(file) {
  if (!file.type.startsWith('image/')) { showToast('이미지 파일만 가능해요'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900; let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let q = .85, dataUrl = canvas.toDataURL('image/jpeg', q);
      while (dataUrl.length > 750000 && q > .3) { q -= .1; dataUrl = canvas.toDataURL('image/jpeg', q); }
      if (dataUrl.length > 900000) { showToast('이미지가 너무 커요'); return; }
      pendingImgs.push({ dataUrl, name: file.name }); renderPreviews();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function renderPreviews() {
  const wrap = document.getElementById('prev-wrap');
  if (!wrap) return;
  wrap.innerHTML = pendingImgs.map((img,i) => `
    <div class="prev-item"><img src="${img.dataUrl}" />
    <button class="rm-btn" onclick="removeImg(${i})">✕</button></div>`).join('');
}
window.removeImg = function(i) { pendingImgs.splice(i,1); renderPreviews(); };

// ── Submit ──
window.submitPost = async function() {
  const btn    = document.getElementById('post-btn');
  const author = '';
  if (activeTab === '스케줄') {
    if (!pendingImgs.length) { showToast('이미지를 먼저 추가해주세요'); return; }
    btn.disabled = true;
    try {
      for (const img of pendingImgs) {
        await addDoc(collection(db,'posts'), { dept:'스케줄', type:'schedule', content:img.name, images:[img.dataUrl], author, important:false, createdAt:serverTimestamp() });
      }
      pendingImgs=[]; renderPreviews(); showToast('업로드 완료!');
    } catch(e) { showToast('오류가 발생했습니다'); } finally { btn.disabled=false; }
    return;
  }
  const text = (document.getElementById('compose-text')?.value||'').trim();
  if (!text) { showToast('내용을 입력해주세요'); return; }
  btn.disabled = true;
  try {
    await addDoc(collection(db,'posts'), { dept:activeTab, type:activeType, content:text, images:[], author, important:false, createdAt:serverTimestamp() });
    document.getElementById('compose-text').value = ''; showToast('게시되었습니다!');
  } catch(e) { showToast('오류가 발생했습니다'); } finally { btn.disabled=false; }
};

window.saveEdit = async function(id) {
  const val = (document.getElementById('edit-ta-'+id)?.value||'').trim();
  if (!val) { showToast('내용을 입력해주세요'); return; }
  try {
    const updates = { content: val };
    if (editingType) updates.type = editingType;
    // update allPosts locally so renderPosts reflects the change immediately
    const idx = allPosts.findIndex(p => p.id === id);
    if (idx !== -1) {
      allPosts[idx] = { ...allPosts[idx], ...updates };
    }
    editingId = null; editingType = null;
    renderPosts();
    showToast('수정되었습니다');
    await updateDoc(doc(db,'posts',id), updates);
  }
  catch(e) { showToast('오류가 발생했습니다'); }
};

function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return sameDay ? `오늘 ${hh}:${min}` : `${mm}/${dd} ${hh}:${min}`;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

            <div class="tip-box">💡 접속 후 위의 「홈 화면에 추가」 방법대로 하면 앱처럼 쓸 수 있어요!</div>
          </div>
        </div>

        <div class="guide-section" style="border: 1px solid #b3ccee; background: var(--blue-l);">
          <div class="guide-section-hdr" onclick="toggleGuide(this)" style="background: var(--blue-l);">
            <span class="g-icon">🔗</span>
            <span class="g-title" style="color: var(--blue-t);">만든 사람</span>
            <span class="g-arrow">▼</span>
          </div>
          <div class="guide-body">
            <div style="display:flex; flex-direction:column; gap:10px;">
              <a href="https://hyinuyu.github.io/Emergency-room/" target="_blank"
                style="display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); text-decoration:none; color:var(--text); transition: border-color .13s;"
                onmouseover="this.style.borderColor='var(--border-h)'" onmouseout="this.style.borderColor='var(--border)'">
                <div style="font-size:28px; flex-shrink:0;">🚑</div>
                <div>
                  <div style="font-size:14px; font-weight:600; margin-bottom:3px;">구미차병원 응급실 안내 앱</div>
                  <div style="font-size:12px; color:var(--text2);">응급실 이용 안내, 진료 절차, 주의사항 등을 담은 웹앱입니다.</div>
                  <div style="font-size:11px; color:var(--text3); margin-top:4px;">hyinuyu.github.io/Emergency-room</div>
                </div>
                <div style="margin-left:auto; font-size:16px; color:var(--text3);">›</div>
              </a>
              <a href="https://blog.naver.com/hyinuyu" target="_blank"
                style="display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); text-decoration:none; color:var(--text); transition: border-color .13s;"
                onmouseover="this.style.borderColor='var(--border-h)'" onmouseout="this.style.borderColor='var(--border)'">
                <div style="font-size:28px; flex-shrink:0;">📝</div>
                <div>
                  <div style="font-size:14px; font-weight:600; margin-bottom:3px;">블로그</div>
                  <div style="font-size:12px; color:var(--text2);">응급의학과 관련 정보와 소식을 공유하는 네이버 블로그입니다.</div>
                  <div style="font-size:11px; color:var(--text3); margin-top:4px;">blog.naver.com/hyinuyu</div>
                </div>
                <div style="margin-left:auto; font-size:16px; color:var(--text3);">›</div>
              </a>
            </div>
          </div>
        </div>

      </div>`;

    // attach toggle handlers
    document.querySelectorAll('.guide-section-hdr').forEach(hdr => {
      const body = hdr.nextElementSibling;
      if (hdr.classList.contains('open')) body.classList.add('open');
    });
    return;
  }

  // ── Normal posts ──
  const isSchedule  = activeTab === '스케줄';
  const isImportant = activeTab === '중요';

  let list = isImportant  ? allPosts.filter(p => p.important && p.type !== 'schedule')
           : isSchedule   ? allPosts.filter(p => p.dept === '스케줄')
           :                allPosts.filter(p => p.dept === activeTab);

  if (!isImportant) list = [...list].sort((a,b) => (b.important?1:0)-(a.important?1:0));

  if (!list.length) {
    container.innerHTML = '<div class="empty">아직 게시물이 없습니다.<br>첫 번째 글을 올려보세요!</div>';
    return;
  }

  if (isSchedule) {
    container.innerHTML = `<div class="sched-grid">${list.map(p=>`
      <div class="sched-card">
        <img src="${p.images?.[0]||''}" alt="${esc(p.content)}" loading="lazy" onclick="openLightbox('${encodeURIComponent(p.images?.[0]||'')}')"/>
        <div class="sched-info">
          <div><div class="sched-name">${esc(p.content)}</div><div class="sched-meta">${fmtTime(p.createdAt)}</div></div>
          <button class="sched-del" onclick="deleteSchedPost(event,'${p.id}')">✕</button>
        </div>
      </div>`).join('')}</div>`;
    return;
  }

  container.innerHTML = list.map(p => {
    const deptBadge = p.dept==='응급의학과'
      ? `<span class="badge bd-er">응급의학과</span>`
      : `<span class="badge bd-dept">${esc(p.dept)}</span>`;
    const imgs = (p.images||[]).filter(Boolean);
    return `
      <div class="post-card${p.important?' important':''}" id="card-${p.id}">
        <div class="post-top">
          ${p.important?'<span style="font-size:14px;">⭐</span>':''}
          ${deptBadge}
          <span class="badge ${typeBadge[p.type]||'bd-gen'}">${typeLabels[p.type]||p.type}</span>
          <span class="post-time">${fmtTime(p.createdAt)}</span>
        </div>
        <div class="post-content">${esc(p.content)}</div>
        ${imgs.length?`<div class="post-imgs">${imgs.map(src=>`<img src="${src}" onclick="openLightbox('${encodeURIComponent(src)}')" loading="lazy"/>`).join('')}</div>`:''}
        <div class="post-author">${fmtTime(p.createdAt)}</div>
        <div class="post-actions">
          <button class="action-btn${p.important?' imp-on':''}" onclick="toggleImportant('${p.id}',${!!p.important})">⭐ ${p.important?'중요 해제':'중요'}</button>
          <button class="action-btn" onclick="startEdit('${p.id}',\`${(p.content||'').replace(/`/g,"'").replace(/\n/g,'\\n')}\`,'${p.type}')">✏️ 수정</button>
          <button class="action-btn del" onclick="deletePost('${p.id}')">🗑 삭제</button>
        </div>
      </div>`;
  }).join('');
}

// ── Guide accordion ──
window.toggleGuide = function(hdr) {
  const body = hdr.nextElementSibling;
  const isOpen = hdr.classList.contains('open');
  hdr.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
};

const APP_URL = 'https://hyinuyu.github.io/er-board/';

window.copyUrl = function() {
  navigator.clipboard.writeText(APP_URL).then(() => showToast('링크가 복사되었습니다!'));
};

// ── Lightbox ──
window.openLightbox = function(encoded) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${decodeURIComponent(encoded)}" />`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
};

// ── Real-time ──
onSnapshot(query(collection(db,'posts'), orderBy('createdAt','desc')), snap => {
  allPosts = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  if (editingId) return;
  renderPosts();
}, () => showToast('연결 오류 — Firestore 규칙을 확인해주세요'));

// ── Add tab modal ──
window.showAddModal = function() {
  document.getElementById('modal-area').innerHTML = `
    <div class="modal-bg" onclick="closeMod(event)">
      <div class="modal">
        <h3>과 추가</h3>
        <input id="new-dept" placeholder="예: 피부과, 안과, 비뇨기과..." maxlength="12" />
        <div class="modal-btns">
          <button onclick="closeModal()">취소</button>
          <button class="confirm" onclick="addDept()">추가</button>
        </div>
      </div>
    </div>`;
  document.getElementById('new-dept').focus();
};
window.addDept = async function() {
  const val = document.getElementById('new-dept').value.trim();
  if (!val) { closeModal(); return; }
  if (depts.includes(val)) { showToast('이미 있는 탭이에요'); return; }
  // insert before 스케줄 (start of FIXED_BACK)
  const idx = depts.indexOf('스케줄');
  if (idx !== -1) depts.splice(idx, 0, val); else depts.push(val);
  await saveDepts();
  activeTab = val; activeType = 'tip';
  closeModal(); renderTabs(); renderCompose(); renderPosts();
};

window.closeMod   = e => { if (e.target.classList.contains('modal-bg')) closeModal(); };
window.closeModal = () => { document.getElementById('modal-area').innerHTML = ''; };

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
window.showToast = showToast;

// ── Splash ──
window.enterApp = function(tab) {
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(() => { splash.style.display = 'none'; }, 400);
  activeTab = tab;
  renderTabs(); renderCompose(); renderPosts();
};

loadDepts();
</script>
</body>
</html>
